<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error - Grand Hotel</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .error-box {
            background: #fff;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }

        .error-icon {
            font-size: 50px;
            color: #e74c3c;
            margin-bottom: 15px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 20px;
        }

        .buttons a {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            text-decoration: none;
            color: #fff;
            background-color: #3498db;
        }

        .buttons a:hover {
            background-color: #2980b9;
        }

        .btn-home {
            background-color: #2c3e50;
        }

        .btn-home:hover {
            background-color: #1a252f;
        }

        @media (max-width: 500px) {
            .error-box {
                padding: 30px 20px;
            }

            .buttons a {
                width: 100%;
                display: block;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="error-icon">⚠️</div>
        <h1>Oops! Something went wrong</h1>
        <p th:text="${error} ?: 'We encountered an unexpected error while processing your request.'">
            We encountered an unexpected error while processing your request.
        </p>

        <div class="buttons">
            <a href="/home" class="btn-home">Go to Home</a>
            <a href="javascript:history.back()">Go Back</a>
            <a href="/contact">Contact Support</a>
        </div>
    </div>
</body>
</html>
