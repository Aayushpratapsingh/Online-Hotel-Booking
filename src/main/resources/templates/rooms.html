<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Available Rooms</title>
    <style>
        .rooms-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .room-card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }
        .room-info {
            flex: 1;
        }
        .book-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="rooms-container">
        <h1>Available Rooms</h1>
        <div th:each="room : ${rooms}">
            <div class="room-card">
                <div class="room-info">
                    <h3>Room <span th:text="${room.roomNumber}"></span> - 
                        <span th:text="${room.roomType}"></span></h3>
                    <p th:text="${room.description}"></p>
                    <p><strong>Price:</strong> $<span th:text="${room.pricePerNight}"></span> per night</p>
                    <p><strong>Capacity:</strong> <span th:text="${room.capacity}"></span> guests</p>
                    <p>Amenities: 
                        <span th:if="${room.hasWifi}">WiFi</span>
                        <span th:if="${room.hasAc}">, AC</span>
                        <span th:if="${room.hasTv}">, TV</span>
                        <span th:if="${room.hasMiniBar}">, Mini Bar</span>
                    </p>
                </div>
                <div>
                    <a th:href="@{/bookings/new(roomId=${room.id})}" class="book-btn">
                        Book Now
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
