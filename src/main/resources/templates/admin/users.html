<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="content">
        <!-- Page Header -->
        <div class="page-header">
            <h1>User Management</h1>
            <p>Manage hotel users, staff, and administrators</p>
        </div>
        
        <!-- Actions -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div></div>
            <div>
                <a th:href="@{/admin/users/create}" class="btn btn-primary">
                    <i class="fas fa-plus me-2"></i> Create New User
                </a>
            </div>
        </div>
        
        <!-- Users Table -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6" class="text-center py-5">
                            <div style="text-align: center; padding: 40px; color: #64748b;">
                                <i class="fas fa-users fa-3x mb-3" style="color: #cbd5e1;"></i>
                                <h5>No Users Found</h5>
                                <p class="text-muted">Start by adding your first user</p>
                                <a th:href="@{/admin/users/create}" class="btn btn-primary mt-2">
                                    <i class="fas fa-plus me-2"></i> Add User
                                </a>
                            </div>
                        </td>
                    </tr>
                    
                    <tr th:each="user : ${users}">
                        <td>[[${user.id}]]</td>
                        <td>[[${user.username}]]</td>
                        <td>[[${user.email}]]</td>
                        <td>
                            <span class="badge" 
                                  th:class="'badge ' + 
                                           (${#lists.contains(user.roles.![name], 'ADMIN')} ? 'badge-danger' : 
                                            (${#lists.contains(user.roles.![name], 'STAFF')} ? 'badge-info' : 'badge-secondary'))">
                                <span th:each="role, iter : ${user.roles}" 
                                      th:text="${role.name.replace('ROLE_', '')} + (${iter.last} ? '' : ', ')">
                                </span>
                            </span>
                        </td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${user.enabled} ? 'badge-success' : 'badge-danger'"
                                  th:text="${user.enabled} ? 'Active' : 'Inactive'">
                                Active
                            </span>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" 
                                   class="btn btn-sm btn-primary" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/admin/users/toggle/{id}(id=${user.id})}" 
                                   class="btn btn-sm" 
                                   th:classappend="${user.enabled} ? 'btn-warning' : 'btn-success'"
                                   th:title="${user.enabled} ? 'Disable User' : 'Enable User'">
                                    <i class="fas" th:classappend="${user.enabled} ? 'fa-toggle-on' : 'fa-toggle-off'"></i>
                                </a>
                                <a th:href="@{/admin/users/delete/{id}(id=${user.id})}" 
                                   class="btn btn-sm btn-danger" 
                                   onclick="return confirm('Are you sure you want to delete this user?')"
                                   title="Delete">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
