<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title layout:fragment="title">Reports - Grand Hotel Admin</title>
    <style layout:fragment="custom-css">
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1e293b;
            --gray: #64748b;
            --light: #f8fafc;
            --border: #e2e8f0;
        }
        
        .reports-container {
            padding: 24px;
        }
        
        .page-header {
            margin-bottom: 28px;
        }
        
        .page-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--dark);
            margin: 0 0 8px 0;
        }
        
        .page-header p {
            color: var(--gray);
            margin: 0;
            font-size: 14px;
        }
        
        .last-updated {
            font-size: 12px;
            color: var(--gray);
            margin-top: 5px;
        }
        
        .last-updated i {
            color: var(--success);
            font-size: 8px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stat-info h3 {
            font-size: 32px;
            font-weight: 700;
            color: var(--dark);
            margin: 0 0 8px 0;
        }
        
        .stat-info p {
            color: var(--gray);
            font-size: 14px;
            font-weight: 500;
            margin: 0;
            text-transform: uppercase;
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .icon-revenue { background: #eff6ff; color: var(--primary); }
        .icon-bookings { background: #f0fdf4; color: var(--success); }
        .icon-rooms { background: #fef3c7; color: var(--warning); }
        .icon-occupancy { background: #f1f5f9; color: var(--dark); }
        
        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
        }
        
        .summary-card h3 {
            font-size: 18px;
            color: var(--dark);
            margin: 0 0 20px 0;
        }
        
        .summary-table {
            width: 100%;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .summary-row:last-child {
            border-bottom: none;
        }
        
        .summary-label {
            color: var(--gray);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .summary-value {
            font-weight: 600;
            color: var(--dark);
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-confirmed { background: #dbeafe; color: #1e40af; }
        .badge-checkedin { background: #dcfce7; color: #166534; }
        .badge-checkedout { background: #f3e8ff; color: #6b21a8; }
        .badge-cancelled { background: #fee2e2; color: #991b1b; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="reports-container">
            <!-- Page Header -->
            <div class="page-header">
                <h1>
                    <i class="fas fa-chart-bar me-2" style="color: var(--primary);"></i>
                    Reports
                </h1>
                <p>Hotel performance overview and statistics</p>
                <div class="last-updated">
                    <i class="fas fa-circle"></i> 
                    Last Updated: <span th:text="${#dates.format(currentDate, 'HH:mm:ss')}">00:00:00</span>
                </div>
            </div>

            <!-- Key Stats Cards - REAL DATA FROM DATABASE -->
            <div class="stats-grid">
                <!-- Total Revenue -->
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>RS.<span th:text="${totalRevenue != null ? #numbers.formatDecimal(totalRevenue, 1, 2) : '0.00'}">0.00</span></h3>
                        <p>Total Revenue</p>
                    </div>
                 
                </div>

                <!-- Total Bookings -->
                <div class="stat-card">
                    <div class="stat-info">
                        <h3><span th:text="${totalBookings != null ? totalBookings : '0'}">0</span></h3>
                        <p>Total Bookings</p>
                    </div>
                    <div class="stat-icon icon-bookings">
                        <i class="fas fa-calendar-check"></i>
                    </div>
                </div>

                <!-- Total Rooms -->
                <div class="stat-card">
                    <div class="stat-info">
                        <h3><span th:text="${totalRooms != null ? totalRooms : '0'}">0</span></h3>
                        <p>Total Rooms</p>
                    </div>
                    <div class="stat-icon icon-rooms">
                        <i class="fas fa-bed"></i>
                    </div>
                </div>

                <!-- Occupancy Rate -->
                <div class="stat-card">
                    <div class="stat-info">
                        <h3><span th:text="${occupancyRate != null ? #numbers.formatDecimal(occupancyRate, 1, 1) : '0.0'}">0.0</span>%</h3>
                        <p>Occupancy Rate</p>
                    </div>
                    <div class="stat-icon icon-occupancy">
                        <i class="fas fa-chart-line"></i>
                    </div>
                </div>
            </div>

            <!-- Booking Status Summary - REAL DATA FROM DATABASE -->
            <div class="summary-card">
                <h3><i class="fas fa-clipboard-list me-2"></i> Booking Status Summary</h3>
                
                <div class="summary-table">
                    <!-- Confirmed Bookings -->
                    <div class="summary-row">
                        <span class="summary-label">
                            <span class="status-badge badge-confirmed">Confirmed</span>
                        </span>
                        <span class="summary-value" th:text="${confirmedBookings != null ? confirmedBookings : '0'}">0</span>
                    </div>

                    <!-- Checked-in Bookings -->
                    <div class="summary-row">
                        <span class="summary-label">
                            <span class="status-badge badge-checkedin">Checked In</span>
                        </span>
                        <span class="summary-value" th:text="${checkedInBookings != null ? checkedInBookings : '0'}">0</span>
                    </div>

                    <!-- Checked-out Bookings -->
                    <div class="summary-row">
                        <span class="summary-label">
                            <span class="status-badge badge-checkedout">Checked Out</span>
                        </span>
                        <span class="summary-value" th:text="${checkedOutBookings != null ? checkedOutBookings : '0'}">0</span>
                    </div>

                    <!-- Cancelled Bookings -->
                    <div class="summary-row">
                        <span class="summary-label">
                            <span class="status-badge badge-cancelled">Cancelled</span>
                        </span>
                        <span class="summary-value" th:text="${cancelledBookings != null ? cancelledBookings : '0'}">0</span>
                    </div>

                    <!-- Pending Bookings -->
                    <div class="summary-row">
                        <span class="summary-label">
                            <span class="status-badge badge-pending">Pending</span>
                        </span>
                        <span class="summary-value" th:text="${pendingBookings != null ? pendingBookings : '0'}">0</span>
                    </div>

                    <!-- Available Rooms -->
                    <div class="summary-row">
                        <span class="summary-label">Available Rooms</span>
                        <span class="summary-value" th:text="${availableRooms != null ? availableRooms : '0'}">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script layout:fragment="custom-js">
        // Simple initialization - just log that real data is loaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Reports page loaded with real data:');
            console.log('Total Revenue:', /*[[${totalRevenue}]]*/ 0);
            console.log('Total Bookings:', /*[[${totalBookings}]]*/ 0);
            console.log('Confirmed Bookings:', /*[[${confirmedBookings}]]*/ 0);
            console.log('Checked In:', /*[[${checkedInBookings}]]*/ 0);
            console.log('Checked Out:', /*[[${checkedOutBookings}]]*/ 0);
            console.log('Cancelled:', /*[[${cancelledBookings}]]*/ 0);
            console.log('Pending:', /*[[${pendingBookings}]]*/ 0);
        });
    </script>
</body>
</html>
