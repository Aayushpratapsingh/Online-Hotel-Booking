<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="content">
        <!-- Page Header -->
        <div class="page-header">
            <h1><i class="fas fa-user-plus"></i> Create New User</h1>
            <p>Add a new user account to the hotel system</p>
            <a th:href="@{/admin/users}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>
        
        <!-- Form -->
        <div class="form-container">
            <form method="post" th:action="@{/admin/users/create}" th:object="${user}">
                <!-- Basic Info -->
                <div class="card">
                    <h3><i class="fas fa-info-circle"></i> Basic Information</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>First Name *</label>
                            <input type="text" name="firstName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name *</label>
                            <input type="text" name="lastName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Username *</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" name="phone" class="form-control">
                        </div>
                    </div>
                </div>
                
                <!-- Password -->
                <div class="card">
                    <h3><i class="fas fa-shield-alt"></i> Account Security</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Password *</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Confirm Password *</label>
                            <input type="password" name="confirmPassword" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Account Status</label>
                            <select name="enabled" class="form-select">
                                <option value="true" selected>Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Role -->
                <div class="card">
                    <h3><i class="fas fa-user-tag"></i> User Role</h3>
                    <div class="role-options">
                        <div class="role-option">
                            <input type="radio" name="role" value="ROLE_ADMIN" id="role_admin" required>
                            <label for="role_admin">
                                <i class="fas fa-user-shield"></i>
                                <span>Administrator</span>
                                <small>Full system access</small>
                            </label>
                        </div>
                        <div class="role-option">
                            <input type="radio" name="role" value="ROLE_STAFF" id="role_staff">
                            <label for="role_staff">
                                <i class="fas fa-user-tie"></i>
                                <span>Staff</span>
                                <small>Limited access</small>
                            </label>
                        </div>
                        <div class="role-option">
                            <input type="radio" name="role" value="ROLE_USER" id="role_user">
                            <label for="role_user">
                                <i class="fas fa-user"></i>
                                <span>User</span>
                                <small>Basic access</small>
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- Form Actions -->
                <div class="form-actions">
                    <a th:href="@{/admin/users}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create User</button>
                </div>
            </form>
        </div>
    </div>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .page-header {
            background: white;
            padding: 30px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .page-header h1 {
            color: #1e293b;
            font-size: 24px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .page-header p {
            color: #64748b;
            font-size: 16px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-secondary {
            background: #64748b;
            color: white;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        
        .form-container {
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        
        .card h3 {
            color: #1e293b;
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-control, .form-select {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }
        
        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .role-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        
        .role-option input[type="radio"] {
            display: none;
        }
        
        .role-option label {
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .role-option input[type="radio"]:checked + label {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        
        .role-option label i {
            font-size: 24px;
            color: #64748b;
            margin-bottom: 10px;
        }
        
        .role-option input[type="radio"]:checked + label i {
            color: #3b82f6;
        }
        
        .role-option label span {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 5px;
        }
        
        .role-option label small {
            color: #64748b;
            font-size: 12px;
        }
        
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .role-options {
                grid-template-columns: 1fr;
            }
            
            .page-header {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>
