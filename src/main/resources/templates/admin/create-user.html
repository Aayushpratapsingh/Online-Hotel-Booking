<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create User - Admin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Simple Flat Admin Form UI */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f5f7;
        }

        .form-container {
            max-width: 750px;
            margin: 40px auto;
            padding: 10px;
        }

        .form-card {
            background: #fff;
            border: 1px solid #ddd;
            padding: 25px;
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .form-header i {
            font-size: 24px;
            color: #34495e;
        }

        .form-header h1 {
            margin: 0;
            font-size: 22px;
            color: #34495e;
        }

        .form-header p {
            margin: 3px 0 0;
            font-size: 13px;
            color: #7a7a7a;
        }

        .alert {
            padding: 10px;
            margin: 10px 0;
            font-size: 14px;
            border: 1px solid;
        }

        .alert-success {
            background: #e9f9f1;
            border-color: #2ecc71;
            color: #1e7c49;
        }

        .alert-error {
            background: #fde9e9;
            border-color: #e74c3c;
            color: #b33a30;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 15px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .form-control {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            border: 1px solid #bbb;
            background: #fff;
        }

        .role-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .role-option {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .role-label {
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }

        .form-actions {
            margin-top: 20px;
            text-align: right;
        }

        .btn {
            padding: 8px 14px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-secondary {
            background: #ccc;
            color: #333;
            margin-right: 10px;
        }

        .btn-secondary:hover {
            background: #b3b3b3;
        }

        .btn-primary {
            background: #1abc9c;
            color: #fff;
        }

        .btn-primary:hover {
            background: #16a085;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-card">
            <div class="form-header">
                <i class="fas fa-user-plus"></i>
                <div>
                    <h1>Create New User</h1>
                    <p>Add a new user to the system</p>
                </div>
            </div>

            <div th:if="${success}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}"></span>
            </div>

            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/admin/users/create}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-grid">
                    <div class="form-group">
                        <label for="username">Username *</label>
                        <input type="text" id="username" name="username" class="form-control"
                               placeholder="Enter username" th:value="${user.username}" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password *</label>
                        <input type="password" id="password" name="password"
                               class="form-control" placeholder="Minimum 6 characters" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" name="fullName" class="form-control"
                               placeholder="Enter full name" th:value="${user.fullName}" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email"
                               class="form-control" placeholder="Enter email" th:value="${user.email}" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Assign Roles *</label>
                        <div class="role-options">
                            <div class="role-option" th:each="role : ${allRoles}">
                                <input type="checkbox" th:id="${'role-' + role.id}" 
                                       th:value="${role.id}" name="roleIds"
                                       th:checked="${role.name == 'ROLE_USER'}">
                                <label th:for="${'role-' + role.id}" class="role-label"
                                      th:text="${role.name?.replace('ROLE_', '')}">
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/admin/users}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create User</button>
                </div>
            </form>

        </div>
    </div>
</body>
</html>
