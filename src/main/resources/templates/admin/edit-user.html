<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit User</title>
    <style>
        /* Basic form styling */
        .page-header {
            margin-bottom: 30px;
        }
        
        .page-header h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .page-header p {
            color: #7f8c8d;
            font-size: 15px;
        }
        
        .stat-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 600px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        
        .form-control, .form-select {
            padding: 11px 14px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .btn {
            padding: 12px 26px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: #3498db;
            color: white;
            transition: all 0.25s ease;
        }
        
        .btn:hover {
            opacity: 0.9;
        }
        
        .btn-primary {
            background: #3498db;
        }
        
        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }
    </style>
</head>
<body>
    <!-- FIXED: Added th:fragment="content" wrapper -->
    <div th:fragment="content">
        <!-- Page Header -->
        <div class="page-header">
            <h1><i class="fas fa-user-edit"></i> Edit User</h1>
            <p>Update user information and permissions</p>
        </div>
        
        <!-- Edit User Form -->
        <div class="stat-card">
            <form method="post" th:action="@{/admin/users/update/{id}(id=${user.id})}" th:object="${user}">
                <div class="form-group">
                    <label class="form-label">Username *</label>
                    <input type="text" th:field="*{username}" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email Address *</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Role *</label>
                    <select name="role" class="form-select" required>
                        <option th:each="roleName : ${roleNames}" 
                                th:value="${roleName}"
                                th:text="${roleName.replace('ROLE_', '')}"
                                th:selected="${currentRole == roleName}">
                        </option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select name="enabled" class="form-select">
                        <option value="true" th:selected="${user.enabled}">Active</option>
                        <option value="false" th:selected="${!user.enabled}">Inactive</option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 12px; margin-top: 30px;">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Update User
                    </button>
                    <a th:href="@{/admin/users}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
        
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // Focus on username field
                document.querySelector('input[th\\:field*="username"]')?.focus();
                
                // Form validation
                document.querySelector('form').addEventListener('submit', function(e) {
                    const username = document.querySelector('input[th\\:field*="username"]').value.trim();
                    const email = document.querySelector('input[th\\:field*="email"]').value.trim();
                    
                    if (!username || username.length < 3) {
                        alert('Username must be at least 3 characters long');
                        e.preventDefault();
                        return false;
                    }
                    
                    if (!email || !email.includes('@')) {
                        alert('Please enter a valid email address');
                        e.preventDefault();
                        return false;
                    }
                    
                    return true;
                });
            });
        </script>
    </div>
</body>
</html>
