<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Grand · login Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #b8e1fc 0%, #d0eefd 45%, #f0f9ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.5) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(173, 216, 230, 0.4) 0%, transparent 55%);
            pointer-events: none;
        }

        .card {
            width: 100%;
            max-width: 880px;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 25px 50px -10px rgba(0, 120, 200, 0.25),
                        0 0 0 1px rgba(255, 255, 255, 0.7) inset,
                        0 0 0 2px rgba(135, 206, 235, 0.2);
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .brand-panel {
            background: linear-gradient(135deg, #7ec8ff, #b0e0ff);
            padding: 2.8rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #02457a;
            position: relative;
            isolation: isolate;
        }

        .brand-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 100% 0%, rgba(255,255,255,0.7) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .brand-content {
            position: relative;
            z-index: 2;
        }

        .hotel-name {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            line-height: 1.1;
            margin-bottom: 1rem;
            color: #02386e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hotel-name i {
            font-size: 2.2rem;
            color: white;
            background: #02457a;
            padding: 8px;
            border-radius: 50%;
            box-shadow: 0 6px 14px rgba(0,80,130,0.2);
        }

        .tagline {
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 2.2rem;
            color: #025091;
            border-left: 3px solid white;
            padding-left: 1.2rem;
        }

        .feature-mini {
            list-style: none;
            margin-top: 0.8rem;
        }

        .feature-mini li {
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 400;
            color: #013a62;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(2px);
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .feature-mini i {
            color: #02457a;
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }

        .small-note {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: #015293;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .small-note i {
            color: white;
        }

        .login-panel {
            background: white;
            padding: 2.8rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .greeting {
            margin-bottom: 2rem;
        }

        .greeting h2 {
            font-size: 2rem;
            font-weight: 500;
            color: #02386e;
            letter-spacing: -0.3px;
        }

        .greeting p {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 6px;
        }

        .message-banner {
            padding: 0.9rem 1.2rem;
            border-radius: 60px;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f0f9ff;
            border: 1px solid #b8dff0;
            color: #0369a1;
        }

        .message-banner.error {
            background: #fee2e2;
            border-color: #fecaca;
            color: #b91c1c;
        }

        .message-banner.success {
            background: #dcfce7;
            border-color: #bbf7d0;
            color: #166534;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group i:not(.password-toggle i) {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #7c9ec0;
            font-size: 1rem;
            transition: color 0.2s;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 3rem 1rem 3rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            background-color: #f8fcff;
            color: #0a3147;
        }

        .form-group input:focus {
            outline: none;
            border-color: #7ec8ff;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(126, 200, 255, 0.25);
        }

        .form-group input:focus + i {
            color: #0284c7;
        }

        .form-group input::placeholder {
            color: #8ba3b9;
            opacity: 0.8;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #8ba3b9;
            transition: color 0.2s;
            background: white;
            padding: 0 4px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        .password-toggle:hover {
            color: #0284c7;
            background-color: #f0f9ff;
        }

        .password-toggle i {
            font-size: 1.1rem;
            pointer-events: none;
        }

        .row-simple {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.8rem 0 1.8rem;
            font-size: 0.9rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #2c4b66;
        }

        .remember input {
            accent-color: #7ec8ff;
            width: 16px;
            height: 16px;
            margin: 0;
        }

        .forgot a {
            color: #2c4b66;
            text-decoration: none;
            border-bottom: 1px dashed #b3c9db;
        }

        .forgot a:hover {
            color: #0284c7;
            border-bottom-color: #0284c7;
        }

        .login-button {
            background: #0284c7;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 50px;
            font-weight: 500;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 8px 18px -8px rgba(2, 132, 199, 0.4);
            width: 100%;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .login-button i {
            font-size: 1.1rem;
        }

        .login-button:hover {
            background: #0369a1;
            box-shadow: 0 10px 22px -8px #0284c7;
        }

        .register-simple {
            text-align: center;
            margin-top: 1.8rem;
            color: #445d73;
            font-size: 0.9rem;
        }

        .register-simple a {
            color: #0284c7;
            font-weight: 500;
            text-decoration: none;
            margin-left: 5px;
            border-bottom: 1px solid #b3d9f0;
        }

        .register-simple a:hover {
            color: #02457a;
            border-bottom-color: #02457a;
        }

        @media (max-width: 700px) {
            .card {
                grid-template-columns: 1fr;
                max-width: 450px;
            }

            .brand-panel {
                padding: 2rem;
                text-align: center;
            }

            .hotel-name {
                justify-content: center;
            }

            .feature-mini li {
                justify-content: center;
            }
        }

        @media (max-width: 450px) {
            .login-panel { padding: 2rem 1.5rem; }
            .brand-panel { padding: 1.8rem 1.2rem; }
            .hotel-name { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand-panel">
            <div class="brand-content">
                <div class="hotel-name">
                    <i class="fas fa-building"></i> 
                    Grand Hotel
                </div>
                <div class="tagline">
                    stay simple 
                </div>

                <ul class="feature-mini">
                    <li><i class="fas fa-check-circle"></i> quick booking</li>
                    <li><i class="fas fa-bell-concierge"></i> 24h concierge</li>
                    <li><i class="fas fa-wifi"></i> high-speed wifi</li>
                </ul>

                <div class="small-note">
                    <i class="fas fa-umbrella-beach"></i> 
                    <span>since 2000, fresh as the sky</span>
                </div>
            </div>
        </div>

        <div class="login-panel">
            <div class="greeting">
                <h2>welcome back</h2>
                <p>please sign in to your account</p>
            </div>

            <div th:if="${param.error}" class="message-banner error">
                <i class="fas fa-exclamation-circle"></i> wrong username or password
            </div>
            <div th:if="${param.logout}" class="message-banner success">
                <i class="fas fa-check-circle"></i> logged out successfully
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="username" required autofocus>
                </div>

                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="password" placeholder="password" required>
                    <span class="password-toggle" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>

                <div class="row-simple">
                    <label class="remember">
                        <input type="checkbox" name="remember-me"> remember me
                    </label>
                    <div class="forgot">
                        <a href="/forgot-password">forgot?</a>
                    </div>
                </div>

                <button type="submit" class="login-button">
                    <i class="fas fa-arrow-right-to-bracket"></i> sign in
                </button>
            </form>

            <div class="register-simple">
                new here? <a href="/register">create an account</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Password toggle functionality
            const togglePassword = document.getElementById('togglePassword');
            const password = document.getElementById('password');
            
            if (togglePassword && password) {
                togglePassword.addEventListener('click', function() {
                    // Toggle the type attribute
                    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                    password.setAttribute('type', type);
                    
                    // Toggle the eye icon
                    const icon = this.querySelector('i');
                    if (icon) {
                        if (type === 'password') {
                            icon.className = 'fas fa-eye';
                        } else {
                            icon.className = 'fas fa-eye-slash';
                        }
                    }
                });
            }

            // Subtle focus icon color
            const inputs = document.querySelectorAll('.form-group input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    const icon = input.parentElement.querySelector('i:not(.password-toggle i)');
                    if (icon) icon.style.color = '#0284c7';
                });
                input.addEventListener('blur', () => {
                    const icon = input.parentElement.querySelector('i:not(.password-toggle i)');
                    if (icon) icon.style.color = '#7c9ec0';
                });
            });

            // Autofocus on username field
            window.addEventListener('load', () => {
                const userField = document.querySelector('input[name="username"]');
                if (userField) userField.focus();
            });
        })();
    </script>
</body>
</html>
