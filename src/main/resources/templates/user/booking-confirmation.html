<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - Grand Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #b8860b; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .card {
            max-width: 500px; margin: 30px auto; border-radius: 16px;
            border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .card-body { padding: 30px 25px; }
        .icon {
            width: 60px; height: 60px; background: #d4edda; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; color: #155724; font-size: 30px;
        }
        h2 { color: var(--primary-color); text-align: center; font-size: 24px; margin-bottom: 20px; }
        .ref-box {
            background: #f8f9fa; padding: 12px; border-radius: 8px;
            text-align: center; margin-bottom: 20px; font-size: 14px;
        }
        .ref-box strong { color: var(--primary-color); font-size: 18px; display: block; }
        .row-detail { display: flex; margin-bottom: 12px; font-size: 14px; }
        .label { width: 110px; color: #666; }
        .value { flex: 1; font-weight: 600; color: #333; }
        hr { margin: 15px 0; opacity: 0.5; }
        .btn-group { display: flex; gap: 8px; margin-top: 20px; }
        .btn {
            flex: 1; padding: 10px; border-radius: 8px; font-size: 13px;
            text-decoration: none; text-align: center; font-weight: 500;
        }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-outline { border: 1px solid var(--primary-color); color: var(--primary-color); }
        .small-note { font-size: 12px; color: #888; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-body">
            <div class="icon"><i class="fas fa-check"></i></div>
            <h2>Booking Confirmed!</h2>
            
            <div class="ref-box">
                <div>Your booking reference:</div>
                <strong th:text="${booking.bookingReference}">BK12345678</strong>
            </div>
            
            <div class="row-detail">
                <span class="label">Guest:</span>
                <span class="value" th:text="${username}">John Doe</span>
            </div>
            <div class="row-detail">
                <span class="label">Room:</span>
                <span class="value" th:text="${booking.room != null ? booking.room.roomType : 'N/A'}">Deluxe Room</span>
            </div>
            <div class="row-detail">
                <span class="label">Check-in:</span>
                <span class="value" th:text="${#temporals.format(booking.checkInDate, 'dd MMM yyyy')}">20 Feb 2026</span>
            </div>
            <div class="row-detail">
                <span class="label">Check-out:</span>
                <span class="value" th:text="${#temporals.format(booking.checkOutDate, 'dd MMM yyyy')}">22 Feb 2026</span>
            </div>
            <div class="row-detail">
                <span class="label">Nights:</span>
                <span class="value" th:text="${totalNights}">2</span>
            </div>
            <div class="row-detail">
                <span class="label">Guests:</span>
                <span class="value" th:text="${booking.numberOfGuests}">2</span>
            </div>
            <div class="row-detail">
                <span class="label">Total:</span>
                <span class="value">$<span th:text="${#numbers.formatDecimal(booking.totalPrice, 1, 2)}">299.98</span></span>
            </div>
            
            <hr>
            
            <div class="btn-group">
                <a th:href="@{/user/dashboard}" class="btn btn-primary"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a th:href="@{/bookings/my}" class="btn btn-outline"><i class="fas fa-list"></i> My Bookings</a>
                <a th:href="@{/home}" class="btn btn-outline"><i class="fas fa-home"></i> Home</a>
            </div>
            
            <div class="small-note">
                <i class="fas fa-envelope"></i> A confirmation email has been sent
            </div>
        </div>
    </div>
</body>
</html>
