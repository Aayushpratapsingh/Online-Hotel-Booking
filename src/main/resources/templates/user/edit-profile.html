        /* ========== RESPONSIVE ========== */

         Display Success/Error Messages

         Profile Form 
        <div class="profile-container">
             Profile Header 
            <div class="profile-header">
                <div class="profile-avatar-large">
                    <span th:text="${user.fullName != null ? user.fullName.substring(0,1).toUpperCase() : 'A'}">A</span>
                </div>
                <h2 th:text="${user.fullName}">Aayush Pratap Singh</h2>
                <p th:text="${user.email}">aayushpratapsingh0.9@gmail.com</p>
                <p class="text-muted" th:if="${user.createdAt != null}">Member since <span th:text="${#dates.format(user.createdAt, 'MMMM yyyy')}">January 2024</span></p>

             Personal Information Form 
            <form action="/user/profile/update" method="post" id="profileForm">
                <div class="form-section">
                    <h4><i class="fas fa-user-edit"></i> Personal Information</h4>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">

                            <input type="text" class="form-control" name="firstName" 
                                   th:value="${user.fullName != null ? user.fullName.split(' ')[0] : ''}" 
                                   required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Name *</label>
                            <input type="text" class="form-control" name="lastName" 
                                   th:value="${user.fullName != null && user.fullName.split(' ').length > 1 ? user.fullName.split(' ')[1] : ''}" 
                                   required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Email Address *</label>
                            <input type="email" class="form-control" name="email" 
                                   th:value="${user.email}" required>
                            <div class="form-text">We'll never share your email with anyone else.</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" name="phone" 
                                   th:value="${user.phone != null ? user.phone : ''}" 
                                   placeholder="Enter your phone number">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" th:value="${user.username}" readonly>
                        <div class="form-text">Username cannot be changed.</div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" name="address" rows="3" 
                                  th:text="${user.address != null ? user.address : ''}"
                                  placeholder="Enter your address"></textarea>
                    </div>
                </div>
                
                 Change Password 
                <div class="form-section">
                    <h4><i class="fas fa-lock"></i> Change Password</h4>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Current Password</label>
                            <input type="password" class="form-control" name="currentPassword" 
                                   id="currentPassword" placeholder="Enter current password">
                            <div class="form-text">Required only if changing password.</div>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control" name="newPassword" 
                                   id="newPassword" placeholder="Enter new password">
                            <div class="password-strength">
                                <div class="strength-meter" id="passwordStrength"></div>
                            </div>
                            <div class="password-feedback" id="passwordFeedback"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control" name="confirmPassword"

     Bootstrap JS 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Mobile menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.querySelector('.sidebar');
        
        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
            });
        }
        
        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function(event) {
            if (window.innerWidth <= 992 && 
                sidebar.classList.contains('active') &&
                !sidebar.contains(event.target) &&
                event.target !== menuToggle &&
                !menuToggle.contains(event.target)) {
                sidebar.classList.remove('active');
            }
        });
        
        // Password strength checker
        const newPasswordInput = document.getElementById('newPassword');
        const passwordStrength = document.getElementById('passwordStrength');
        const passwordFeedback = document.getElementById('passwordFeedback');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordMatch = document.getElementById('passwordMatch');
        
        function checkPasswordStrength(password) {
            let strength = 0;
            let feedback = "";
            
            if (password.length === 0) {
                passwordStrength.style.width = "0%";
                passwordStrength.className = "strength-meter";
                passwordFeedback.textContent = "";
                return;
            }
            
            // Length check
            if (password.length >= 8) strength += 25;
            
            // Lowercase check
            if (/[a-z]/.test(password)) strength += 25;
            
            // Uppercase check
            if (/[A-Z]/.test(password)) strength += 25;
            
            // Number/Special character check
            if (/[0-9]/.test(password) || /[^A-Za-z0-9]/.test(password)) strength += 25;
            
            // Update strength meter
            passwordStrength.style.width = strength + "%";
            
            // Set color and feedback
            if (strength <= 25) {
                passwordStrength.className = "strength-meter strength-weak";
                feedback = "Weak password";
            } else if (strength <= 50) {
                passwordStrength.className = "strength-meter strength-medium";
                feedback = "Fair password";
            } else if (strength <= 75) {
                passwordStrength.className = "strength-meter strength-medium";
                feedback = "Good password";
            } else {
                passwordStrength.className = "strength-meter strength-strong";
                feedback = "Strong password";
            }
            
            passwordFeedback.textContent = feedback;
            passwordFeedback.className = "password-feedback";
            
            if (strength <= 50) {
                passwordFeedback.className += " text-danger";
            } else if (strength <= 75) {
                passwordFeedback.className += " text-warning";
            } else {
                passwordFeedback.className += " text-success";
            }
        }
        
        function checkPasswordMatch() {
            const password = newPasswordInput.value;
            const confirm = confirmPasswordInput.value;
            
            if (confirm.length === 0) {
                passwordMatch.textContent = "";
                return;
            }
            
            if (password === confirm) {
                passwordMatch.textContent = "Passwords match";
                passwordMatch.className = "form-text text-success";
            } else {
                passwordMatch.textContent = "Passwords do not match";
                passwordMatch.className = "form-text text-danger";
            }
        }
        
        // Add event listeners
        if (newPasswordInput) {
            newPasswordInput.addEventListener('input', function() {
                checkPasswordStrength(this.value);
                checkPasswordMatch();
            });
        }
        
        if (confirmPasswordInput) {
            confirmPasswordInput.addEventListener('input', checkPasswordMatch);
        }
        
        // Form validation and submission
        const profileForm = document.getElementById('profileForm');
        const saveButton = document.getElementById('saveButton');
        
        if (profileForm) {
            profileForm.addEventListener('submit', function(event) {
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const currentPassword = document.getElementById('currentPassword').value;
                
                // Check if passwords are provided
                if (newPassword || confirmPassword) {
                    // If password change is attempted, current password is required
                    if (!currentPassword) {
                        event.preventDefault();
                        alert('Current password is required to change your password.');
                        return;
                    }
                    
                    // If one password field is filled, both must be filled
                    if (!newPassword || !confirmPassword) {
                        event.preventDefault();
                        alert('Please fill both new password fields if you want to change your password.');
                        return;
                    }
                    
                    // Check if passwords match
                    if (newPassword !== confirmPassword) {
                        event.preventDefault();
                        alert('New passwords do not match.');
                        return;
                    }
                    
                    // Check password strength
                    if (newPassword.length < 6) {
                        event.preventDefault();
                        alert('Password must be at least 6 characters long.');
                        return;
                    }
                }
                
                // Show loading state
                const originalText = saveButton.innerHTML;
                saveButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                saveButton.disabled = true;
                
                // Re-enable button after 5 seconds if form submission fails
                setTimeout(() => {
                    saveButton.innerHTML = originalText;
                    saveButton.disabled = false;
                }, 5000);
            });
        }
        
        // Auto-fill name fields on page load
        document.addEventListener('DOMContentLoaded', function() {
            const fullNameElement = document.querySelector('.profile-header h2');
            if (fullNameElement) {
                const fullName = fullNameElement.textContent;
                const nameParts = fullName.split(' ');
                
                if (nameParts.length >= 2) {
                    const firstNameInput = document.querySelector('input[name="firstName"]');
                    const lastNameInput = document.querySelector('input[name="lastName"]');
                    
                    if (firstNameInput && !firstNameInput.value) {
                        firstNameInput.value = nameParts[0];
                    }
                    
                    if (lastNameInput && !lastNameInput.value && nameParts.length > 1) {
                        lastNameInput.value = nameParts.slice(1).join(' ');
                    }
                }
            }
        });
        
        // Add active class to clicked menu item
