<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Dashboard</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .header { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; }
        .menu a { margin-right: 15px; padding: 10px 15px; background: #3498db; color: white; 
                  text-decoration: none; border-radius: 4px; }
        .welcome { background: white; padding: 20px; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>User Dashboard</h1>
        <p>Welcome, <span th:text="${username}"></span> | 
           <a href="/logout" style="color: white;">Logout</a></p>
    </div>
    
    <div class="welcome">
        <h2>Welcome to Your Dashboard</h2>
        <p>This is your user dashboard. You can manage your bookings and profile from here.</p>
    </div>
    
    <div class="menu">
        <a href="/user/bookings">My Bookings</a>
        <a href="/user/profile">My Profile</a>
        <a href="/rooms">View Rooms</a>
        <a href="/contact">Contact Us</a>
    </div>
</body>
</html>
